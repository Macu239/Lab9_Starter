<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({ 
      token: "7afb10bf4685466e8ff65df97534dc9f"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button class="ConsoleLogbutton">Console Log</button>
      <button class="ConsoleErrorbutton">Console Error</button>
      <button class="ConsoleCountbutton">Console Count</button>
      <button class="ConsoleWarnbutton">Console Warn</button>
      <button class="ConsoleAssertbutton">Console Assert</button>
      <button class="ConsoleClearbutton">Console Clear</button>
      <button class="ConsoleDirbutton">Console Dir</button>
      <button class="ConsoleDirxmlbutton">Console dirxml</button>
      <button class="ConsoleGroupStartbutton">Console Group Start</button>
      <button class="ConsoleGroupEndbutton">Console Group End</button>
      <button class="ConsoleTablebutton">Console Table</button>
      <button class="StartTimerbutton">Start Timer</button>
      <button class="EndTimerbutton">End Timer</button>
      <button class="ConsoleTracebutton">Console Trace</button>
      <button class="TriggerGlobalErrorbutton">Trigger a Global Error</button>
    </section>
  </main>
  
  
  <script>
    class invalidInputError extends Error {
      constructor(message) {
        super(message);
        this.name = 'invalidInputError';
      }
    }

    class divideByZeroError extends Error {
      constructor(message) {
        super(message);
        this.name = 'divideByZeroError';
      }
    }

    class emptyInputError extends Error {
      constructor(message) {
        super(message);
        this.name = 'emptyInputError';
      }
    }



    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      let calculateBtn = document.querySelector("#calculate");
      calculateBtn.disabled = true;
      console.log('Calculate button disabled');
      try {
         if(firstNum === '' || secondNum === '') {
          throw new emptyInputError('Both inputs must be filled');
        }
        if (isNaN(firstNum) || isNaN(secondNum)) {
          throw new invalidInputError('Both inputs must be numbers');
        }
        if (operator === '/' && Number(secondNum) === 0) {
          throw new divideByZeroError('Cannot divide by zero');
        }
        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (error) {
        if (error instanceof divideByZeroError) {
          output.innerHTML = 'Math error: ' + error.message;
        } else if (error instanceof invalidInputError) {
          output.innerHTML = 'Input error: ' + error.message;
        } else if (error instanceof emptyInputError) {
          output.innerHTML = 'Empty input error: ' + error.message;
        } else {
          output.innerHTML = 'Unexpected error: ' + error.message;
        }
        console.error(`[${error.name}]`, error.message);
      }finally {
        calculateBtn.disabled = false;
        console.log('finally ran — button re-enabled');
      }
    });

    

    

   
  </script>
  <script src="lab9.js"></script>
</body>

</html>
